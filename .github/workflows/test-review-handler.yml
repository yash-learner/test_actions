name: Test Review Handler

on:
  workflow_run:
    workflows: ["Test Review Trigger"]
    types:
      - completed

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  handle-review:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Dump full event payload
        env:
          EVENT: ${{ toJson(github.event) }}
        run: echo "$EVENT"

      - name: Dump workflow_run payload
        env:
          WORKFLOW_RUN: ${{ toJson(github.event.workflow_run) }}
        run: echo "$WORKFLOW_RUN"

      - name: Log key workflow_run fields
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          PULL_REQUESTS: ${{ toJson(github.event.workflow_run.pull_requests) }}
        run: |
          echo "=== workflow_run fields ==="
          echo "head_sha: ${{ github.event.workflow_run.head_sha }}"
          echo "head_branch: $HEAD_BRANCH"
          echo "head_repository.full_name: ${{ github.event.workflow_run.head_repository.full_name }}"
          echo "head_repository.owner.login: ${{ github.event.workflow_run.head_repository.owner.login }}"
          echo "conclusion: ${{ github.event.workflow_run.conclusion }}"
          echo "event: ${{ github.event.workflow_run.event }}"
          echo "id: ${{ github.event.workflow_run.id }}"
          echo "run_number: ${{ github.event.workflow_run.run_number }}"
          echo "=== pull_requests array ==="
          echo "$PULL_REQUESTS"

      - name: Check for review artifact
        id: check-artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARTIFACT_NAME=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/artifacts" \
            --jq '.artifacts[] | select(.name == "review-info") | .name')
          if [[ -n "$ARTIFACT_NAME" ]]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "review-info artifact found"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No review-info artifact found — expected for non-changes_requested reviews"
          fi

      - name: Download review info
        if: steps.check-artifact.outputs.exists == 'true'
        uses: actions/download-artifact@v4
        with:
          name: review-info
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Log artifact contents
        if: steps.check-artifact.outputs.exists == 'true'
        run: |
          echo "=== Artifact contents ==="
          echo "pr_number.txt: $(cat pr_number.txt)"
          echo "review_state.txt: $(cat review_state.txt)"

      - name: Read and validate review info
        if: steps.check-artifact.outputs.exists == 'true'
        id: review
        run: |
          PR_NUMBER=$(cat pr_number.txt)
          REVIEW_STATE=$(cat review_state.txt)

          if ! [[ "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid PR number: $PR_NUMBER"
            exit 1
          fi

          if [[ "$REVIEW_STATE" != "changes_requested" && "$REVIEW_STATE" != "approved" && \
                "$REVIEW_STATE" != "commented" && "$REVIEW_STATE" != "dismissed" ]]; then
            echo "::error::Invalid review state: $REVIEW_STATE"
            exit 1
          fi

          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "review_state=$REVIEW_STATE" >> $GITHUB_OUTPUT

      - name: Comment on PR
        if: steps.check-artifact.outputs.exists == 'true'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.review.outputs.pr_number }}
          REVIEW_STATE: ${{ steps.review.outputs.review_state }}
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: [
                "### 🧪 Test Review Handler Ran!",
                "",
                `**PR:** #${prNumber}`,
                `**Review State:** ${process.env.REVIEW_STATE}`,
                `**Head SHA:** \`${context.payload.workflow_run.head_sha}\``,
                `**Head Branch:** ${context.payload.workflow_run.head_branch}`,
                `**Head Repo:** ${context.payload.workflow_run.head_repository.full_name}`,
              ].join("\n")
            });

      - name: Handle Review Changes Requested
        if: steps.check-artifact.outputs.exists == 'true' && steps.review.outputs.review_state == 'changes_requested'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.review.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit $PR_NUMBER --remove-label "needs review" --repo $REPO 2>/dev/null || true
          gh pr edit $PR_NUMBER --remove-label "needs testing" --repo $REPO 2>/dev/null || true
          gh pr edit $PR_NUMBER --add-label "changes required" --repo $REPO
